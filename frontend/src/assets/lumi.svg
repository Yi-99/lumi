<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background Gradient: Deep Night Blue to Rich Indigo -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>

    <!-- Main Star Gradient: Bright Yellow to Vibrant Amber -->
    <linearGradient id="star-grad" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#FEF08A" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    
    <!-- Accent Spark Gradient -->
    <linearGradient id="spark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FDE047" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Icon Shape: Rounded Rectangle for Web Extension Standard -->
  <rect x="12" y="12" width="232" height="232" rx="52" fill="url(#bg-grad)" />

  <!-- Ambient Glow Behind the Main Star -->
  <circle cx="128" cy="128" r="48" fill="#F59E0B" opacity="0.4" filter="url(#glow)" />

  <!-- Main Center "Lumi" Star -->
  <path 
    d="M 128 44 Q 128 128 44 128 Q 128 128 128 212 Q 128 128 212 128 Q 128 128 128 44 Z" 
    fill="url(#star-grad)" 
    filter="url(#glow)"
  />

  <!-- Bright Inner Core for the Main Star -->
  <path 
    d="M 128 72 Q 128 128 72 128 Q 128 128 128 184 Q 128 128 184 128 Q 128 128 128 72 Z" 
    fill="#FFFFFF" 
  />

  <!-- Top Right Mini Sparkle -->
  <path 
    d="M 190 54 Q 190 74 170 74 Q 190 74 190 94 Q 190 74 210 74 Q 190 74 190 54 Z" 
    fill="url(#spark-grad)" 
    opacity="0.9"
  />

  <!-- Bottom Left Mini Sparkle -->
  <path 
    d="M 70 166 Q 70 180 56 180 Q 70 180 70 194 Q 70 180 84 180 Q 70 180 70 166 Z" 
    fill="url(#spark-grad)" 
    opacity="0.7"
  />
</svg>
