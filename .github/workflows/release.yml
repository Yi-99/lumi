name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest version matches tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(jq -r .version extension/manifest.json)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match manifest version $VERSION" >&2
            exit 1
          fi

      - name: Build release zips
        run: bash scripts/build.sh

      - name: Lint Firefox build
        run: npx --yes web-ext lint --source-dir dist/firefox --warnings-as-errors=false

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

      - name: Upload artifacts (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lumi-zips
          path: dist/*.zip
