          - heading "Three answers, one glance" [level=2] [ref=f2e61]
          - paragraph [ref=f2e62]: Click Compare all and every model’s answer lines up in columns. Different models disagree more often than you’d think — lumi makes the disagreement visible instead of hiding it behind one confident voice.
