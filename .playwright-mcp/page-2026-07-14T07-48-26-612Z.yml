      - heading "Small card, complete tool" [level=2] [ref=f2e82]
      - generic [ref=f2e83]:
        - generic [ref=f2e84]:
          - heading "Follow-up threads" [level=3] [ref=f2e85]
          - paragraph [ref=f2e86]: Ask a question about the selection and the card becomes a thread — earlier answers stay visible while the new one streams in below.
        - generic [ref=f2e87]:
          - heading "Prompt history" [level=3] [ref=f2e88]
          - paragraph [ref=f2e89]: With the optional local proxy running, every lookup and follow-up is saved to a SQLite database on your machine, browsable from the card.
        - generic [ref=f2e90]:
          - heading "Encrypted key vault" [level=3] [ref=f2e91]
          - paragraph [ref=f2e92]: API keys are encrypted at rest with AES-GCM-256 behind a non-extractable WebCrypto master key. They never sync and never leave your device.
        - generic [ref=f2e93]:
          - heading "Token usage meter" [level=3] [ref=f2e94]
          - paragraph [ref=f2e95]: The settings page tallies input and output tokens per provider, parsed from each provider’s own streaming usage reports — so you know what each key costs.
        - generic [ref=f2e96]:
          - heading "Optional local proxy" [level=3] [ref=f2e97]
          - paragraph [ref=f2e98]: A dockerized FastAPI server can handle the provider fan-out on your machine. If it’s down, the extension silently falls back to direct calls.
        - generic [ref=f2e99]:
          - heading "No build, no cloud" [level=3] [ref=f2e100]
          - paragraph [ref=f2e101]: "Plain JavaScript, Manifest V3, MIT licensed. There is no lumi server: your selections go straight to the providers you enable, and nowhere else."
    - generic [ref=f2e109]:
      - heading "Your keys never leave your machine" [level=2] [ref=f2e110]
      - paragraph [ref=f2e111]: Keys are encrypted at rest and sent only to each provider’s official API endpoint. There is no lumi cloud, no analytics, and no tracking — the optional proxy and its history database run on your own hardware.
