      - heading "From selection to answer in one gesture" [level=2] [ref=f2e41]
      - list [ref=f2e42]:
        - listitem [ref=f2e43]:
          - generic [ref=f2e44]: Step 1
          - heading "Highlight" [level=3] [ref=f2e45]
          - paragraph [ref=f2e46]: Select a word or phrase on any webpage, or press ⌘⇧L / Ctrl+Shift+L. lumi sends the selection plus its surrounding paragraph, so answers fit the passage — not a generic dictionary entry.
        - listitem [ref=f2e47]:
          - generic [ref=f2e48]: Step 2
          - heading "Every model answers at once" [level=3] [ref=f2e49]
          - paragraph [ref=f2e50]: A card pops up under your selection and queries Claude, GPT-4o, and Gemini in parallel, streaming tokens live as each one responds.
        - listitem [ref=f2e51]:
          - generic [ref=f2e52]: Step 3
          - heading "Fastest wins the tab" [level=3] [ref=f2e53]
          - paragraph [ref=f2e54]:
