          - heading "Made for midnight reading" [level=2] [ref=f2e68]
          - paragraph [ref=f2e69]: The card follows your system theme automatically, or force light or dark from the settings page. Either way it renders in a shadow DOM, so the pages you visit can’t restyle it — and it can’t disturb them.
        - img "Lookup card in dark mode" [ref=f2e71]
