          - heading "Bring your own API keys" [level=2] [ref=e80]
          - paragraph [ref=e81]: Paste a key for at least one provider and untick the ones you don’t want without deleting anything. The usage meter shows tokens in, tokens out, and lookup counts per provider, with a reset button.
