      - generic [ref=e88]:
        - generic [ref=e89]:
          - heading "Follow-up threads" [level=3] [ref=e90]
          - paragraph [ref=e91]: Ask a question about the selection and the card becomes a thread — earlier answers stay visible while the new one streams in below.
        - generic [ref=e92]:
          - heading "Prompt history" [level=3] [ref=e93]
          - paragraph [ref=e94]: With the optional local proxy running, every lookup and follow-up is saved to a SQLite database on your machine, browsable from the card.
        - generic [ref=e95]:
          - heading "Encrypted key vault" [level=3] [ref=e96]
          - paragraph [ref=e97]: API keys are encrypted at rest with AES-GCM-256 behind a non-extractable WebCrypto master key. They never sync and never leave your device.
        - generic [ref=e98]:
          - heading "Token usage meter" [level=3] [ref=e99]
          - paragraph [ref=e100]: The settings page tallies input and output tokens per provider, parsed from each provider’s own streaming usage reports — so you know what each key costs.
        - generic [ref=e101]:
          - heading "Optional local proxy" [level=3] [ref=e102]
          - paragraph [ref=e103]: A dockerized FastAPI server can handle the provider fan-out on your machine. If it’s down, the extension silently falls back to direct calls.
        - generic [ref=e104]:
          - heading "No build, no cloud" [level=3] [ref=e105]
          - paragraph [ref=e106]: "Plain JavaScript, Manifest V3, MIT licensed. There is no lumi server: your selections go straight to the providers you enable, and nowhere else."
    - generic [ref=e114]:
      - heading "Your keys never leave your machine" [level=2] [ref=e115]
      - paragraph [ref=e116]: Keys are encrypted at rest and sent only to each provider’s official API endpoint. There is no lumi cloud, no analytics, and no tracking — the optional proxy and its history database run on your own hardware.
