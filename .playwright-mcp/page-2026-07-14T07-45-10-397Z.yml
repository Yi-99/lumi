          - article [ref=e38]:
            - heading "The ocean makes its own light" [level=3] [ref=e39]
            - paragraph [ref=e40]: "In the abyssal dark, where sunlight gives out long before the seafloor begins, most of the light that exists is made by the creatures themselves. This is bioluminescence: a chemical reaction in which a molecule called luciferin is oxidized with the help of the enzyme luciferase, releasing energy as cold light instead of heat."
            - paragraph [ref=e41]: Animals put the glow to remarkably practical use. The hatchetfish hides by shining — its belly photophores match the faint light from above, a trick known as counterillumination that erases its silhouette from predators below. Nearer the surface, swarms of dinoflagellates flash blue when disturbed, which is why a boat’s wake can burn like a comet on a moonless night.
        - paragraph [ref=e42]: "This page is the demo: select a word in the article above and a card appears — in the extension, this works on every website, with ⌘⇧L for longer passages."
